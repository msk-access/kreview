site_name: Kreview
site_url: https://msk-access.github.io/kreview/
repo_url: https://github.com/msk-access/kreview
repo_name: msk-access/kreview
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\,(?!\d)|&[lg]t;'
  - mermaid2:
      version: "11.4.0"
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      zoomable: true
      draggable: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - panzoom:
      full_screen: True
      always_show_hint: false
      key: "none"
  - mkdocs-pdf
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Running Pipeline: getting-started/pipeline-cli.md
  - Biological Framework:
      - ctDNA Labeling: biology/ctdna-labeling.md
      - Fragmentomics Features: biology/fragmentomics-features.md
  - Machine Learning & Statistics:
      - Statistical Tests: machine-learning/statistical-tests.md
      - Models & Metrics: machine-learning/models-and-metrics.md
  - Developer Guide:
      - nbdev Workflow: developer/nbdev-workflow.md
      - Adding a Feature: developer/adding-a-feature.md
      - DuckDB Architecture: developer/duckdb-architecture.md
      - Contributing: developer/contributing.md
      - Release Guide: developer/release-guide.md
  - Operations:
      - CI/CD Pipelines: operations/ci-cd.md
      - Docker: operations/docker.md
      - Nextflow: operations/nextflow.md
      - Troubleshooting: operations/troubleshooting.md
  - API Reference:
      - CLI: api-reference/cli.md
      - Core Operations: api-reference/core.md
      - Labeling Engine: api-reference/labels.md
      - Evaluation Engine: api-reference/eval-engine.md
      - Evaluator Registry: api-reference/features.md
  - Changelog: changelog.md
markdown_extensions:
  - admonition
  - mkdocs-typer
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      auto_append:
        - includes/abbreviations.md
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - abbr
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/msk-access/kreview

