[DEFAULT]
# All sections below are required unless otherwise specified.
# See https://github.com/AnswerDotAI/nbdev/blob/main/settings.ini for examples.

### Python library ###
repo = kreview
lib_name = %(repo)s
version = 0.0.1
min_python = 3.7
license = agpl3
black_formatting = False

### nbdev ###
doc_path = _docs
lib_path = kreview
nbs_path = nbs
recursive = True
tst_flags = notest
put_version_in_init = True

### Docs ###
branch = main
custom_sidebar = False
doc_host = https://%(user)s.github.io
doc_baseurl = /%(repo)s
git_url = https://github.com/%(user)s/%(repo)s
title = %(lib_name)s

### PyPI ###
audience = Developers
author = Ronak Shah
author_email = shahr2@mskcc.org
copyright = 2026 onwards, %(author)s
description = Evaluate cfDNA fragmentomics features for ctDNA detection
keywords = nbdev jupyter notebook python
language = English
status = 3
user = msk-access

