name: Release
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write      # Required for PyPI Trusted Publisher OIDC
      packages: write      # Required for GHCR (Docker) Publishing

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install build and docs dependencies
        run: |
          python -m pip install --upgrade pip build twine
          pip install -e .[docs]
          
      - name: Build package
        run: python -m build
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          skip-existing: true
          verbose: true
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/msk-access/kreview:${{ github.ref_name }},ghcr.io/msk-access/kreview:latest
          platforms: linux/amd64
          annotations: |
            org.opencontainers.image.title=kreview
            org.opencontainers.image.description=Evaluate cfDNA fragmentomics features for ctDNA detection
            org.opencontainers.image.url=https://github.com/msk-access/kreview
            org.opencontainers.image.source=https://github.com/msk-access/kreview
            org.opencontainers.image.vendor=MSK-ACCESS
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.version=${{ github.ref_name }}
          
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch --all

      - name: Build and deploy versioned docs
        # Strips 'v' if present (e.g., v0.1.0 -> 0.1.0) and updates stable alias
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mike deploy --push --update-aliases $VERSION stable
