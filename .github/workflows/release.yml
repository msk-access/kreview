name: Release
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Job 1: Build, Publish, and Push ──────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write      # Required for PyPI Trusted Publisher OIDC
      packages: write      # Required for GHCR (Docker) Publishing

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install build and docs dependencies
        run: |
          python -m pip install --upgrade pip build twine
          pip install -e .[docs]
          
      - name: Build package
        run: python -m build
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          skip-existing: true
          verbose: true

      # Free disk space before Docker builds — GPU image needs ~10 GB
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cpu
          push: true
          tags: ghcr.io/msk-access/kreview:${{ github.ref_name }},ghcr.io/msk-access/kreview:latest
          platforms: linux/amd64
          annotations: |
            org.opencontainers.image.title=kreview
            org.opencontainers.image.description=Evaluate cfDNA fragmentomics features for ctDNA detection
            org.opencontainers.image.url=https://github.com/msk-access/kreview
            org.opencontainers.image.source=https://github.com/msk-access/kreview
            org.opencontainers.image.vendor=MSK-ACCESS
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push GPU Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: gpu
          push: true
          tags: ghcr.io/msk-access/kreview:${{ github.ref_name }}-gpu,ghcr.io/msk-access/kreview:latest-gpu
          platforms: linux/amd64
          annotations: |
            org.opencontainers.image.title=kreview-gpu
            org.opencontainers.image.description=Evaluate cfDNA fragmentomics features for ctDNA detection (GPU Runtime)
            org.opencontainers.image.url=https://github.com/msk-access/kreview
            org.opencontainers.image.source=https://github.com/msk-access/kreview
            org.opencontainers.image.vendor=MSK-ACCESS
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.version=${{ github.ref_name }}
          
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch --all

      - name: Build and deploy versioned docs
        # Strips 'v' if present (e.g., v0.1.0 -> 0.1.0) and sets it as the default homepage
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mike deploy --push --update-aliases $VERSION latest
          mike set-default --push latest

  # ── Job 2: Deploy to GitHub Pages ────────────────────────────────────────────
  # Separated from the release job so that environment protection rules on
  # 'github-pages' do not block PyPI / GHCR publishing.
  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-export
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-export
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
