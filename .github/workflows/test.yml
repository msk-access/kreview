name: Test
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Python tests + sdist/wheel build ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e .[test]

      - name: Run tests with pytest
        run: pytest --cov=kreview --cov-report=xml

      - name: Test Python Package Build
        run: python -m build

  # ── Docker image builds (both targets, in parallel) ─────────────────────────
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # report cpu and gpu independently
      matrix:
        target: [cpu, gpu]

    steps:
      - uses: actions/checkout@v5

      # The GPU image (CUDA base + torch's bundled CUDA wheels) is several GB and
      # overflows the runner's ~14 GB root disk. Reclaim ~20-30 GB before building.
      # Not needed for the small CPU image, so it's gated on the target.
      - name: Free disk space
        if: matrix.target == 'gpu'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test ${{ matrix.target }} image build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                              # build only, do not publish
          target: ${{ matrix.target }}             # cpu or gpu, from the matrix
          tags: kreview:test-${{ matrix.target }}
          platforms: linux/amd64
